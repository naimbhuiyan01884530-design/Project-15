<script>
    const modal = document.getElementById("contactModal");

    // পপ-আপ খোলার জন্য
    function openModal() { 
        modal.style.display = "flex"; // এখানে flex দিলে কন্টেন্ট মাঝখানে থাকবে
    }

    // পপ-আপ বন্ধ করার জন্য
    function closeModal() { 
        modal.style.display = "none"; 
    }

    // বক্সের বাইরে (কালো অংশে) ক্লিক করলে বন্ধ হয়ে যাবে
    window.onclick = function(event) { 
        if (event.target === modal) { 
            closeModal(); 
        } 
    }
</script>
