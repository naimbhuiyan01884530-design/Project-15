<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project 13 - Proggaloy</title>
    <style>
        /* CSS Reset */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f0f0f0;
        }

        .header {
            background-color: black;
            height: 100px;
            width: 100%;
            max-width: 360px;
            color: white;
            margin: 0 auto; /* স্ক্রিন মাঝখানে রাখার জন্য */
        }

        .ancor {
            background-color: rgba(47, 106, 50, 0.7);
            padding: 10px 0;
            text-align: center;
        }

        a {
            text-decoration: none;
            color: yellow;
            margin: 0 5px;
            font-size: 13px;
        }

        #searchbox {
            background-color: white;
            font-size: 15px;
            height: 25px;
            border-radius: 10px;
            margin-top: 15px;
            margin-left: 10px;
            text-align: center;
            border: none;
            width: 180px;
        }

        .searchbutton {
            font-size: 14px;
            color: black;
            background-color: skyblue;
            border-radius: 10px;
            height: 25px;
            width: 90px;
            cursor: pointer;
            border: none;
            vertical-align: middle;
        }

        main {
            height: 600px;
            width: 100%;
            max-width: 360px;
            background-color: skyblue;
            margin: 0 auto;
        }

        .footer {
            background-color: black;
            height: 80px;
            color: white;
            text-align: center;
            width: 100%;
            max-width: 360px;
            margin: 0 auto;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .progga {
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header>
        <div class="header">
            <div class="ancor"> 
                <a href="#" class="progga">proggaloy.com</a>
                <a href="#">Contact</a>
                <a href="#">Course</a>
                <a href="#">About Us</a>
            </div>
            
            <input type="text" placeholder="proggaloy.com" id="searchbox">
            <button class="searchbutton">
                &#128270; Search
            </button>
        </div>
    </header>

    <main>
        </main>

    <footer>
        <div class="footer">
            <p>&copy; 2026 Proggaloy. All rights reserved.</p>
        </div>
    </footer>

</body>
</html>
